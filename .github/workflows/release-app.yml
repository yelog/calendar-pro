name: release-app

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: false

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Import signing certificate
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > /tmp/certificate.p12

          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import /tmp/certificate.p12 \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          rm -f /tmp/certificate.p12

      - name: Build, sign, and package
        env:
          VERSION: ${{ steps.version.outputs.tag }}
          CODESIGN_ENABLED: "1"
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: bash scripts/build/package-app.sh

      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi

      - name: Determine release type
        id: release_type
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          # Detect pre-release (tags containing beta, alpha, rc)
          PRERELEASE="false"
          if [[ "$TAG" =~ -(beta|alpha|rc)\.[0-9]+$ ]]; then
            PRERELEASE="true"
            echo "Detected pre-release tag: $TAG"
          fi

          echo "is_prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Release type: prerelease=$PRERELEASE (tag: $TAG)"

      - name: Install Sparkle tools
        run: |
          SPARKLE_VERSION="2.6.4"
          curl -L -o /tmp/Sparkle.tar.xz "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          mkdir -p /tmp/sparkle-tools
          tar -xf /tmp/Sparkle.tar.xz -C /tmp/sparkle-tools
          cp /tmp/sparkle-tools/bin/sign_update /usr/local/bin/sign_update
          cp /tmp/sparkle-tools/bin/generate_appcast /usr/local/bin/generate_appcast
          chmod +x /usr/local/bin/sign_update /usr/local/bin/generate_appcast

      - name: Sign release with Sparkle
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          DMG_PATH="dist/CalendarPro-${TAG#v}-universal.dmg"

          # Create EdDSA signature
          SIGNATURE=$(echo "$SPARKLE_PRIVATE_KEY" | sign_update --ed-key-file - "$DMG_PATH")
          echo "Sparkle signature: $SIGNATURE"
          echo "$SIGNATURE" > "${DMG_PATH}.sparkle-signature"

      - name: Update appcast.xml
        id: update_appcast
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          DMG_PATH="dist/CalendarPro-${TAG#v}-universal.dmg"
          VERSION="${TAG#v}"

          FILE_SIZE=$(stat -f%z "$DMG_PATH")
          SIGNATURE=$(cat "${DMG_PATH}.sparkle-signature")

          # Calculate sparkle:version (numeric)
          BASE_VERSION=$(echo "$VERSION" | sed -E 's/([0-9]+)\.([0-9]+)\.([0-9]+).*/\1\2\3/')
          if [[ "$VERSION" =~ -(alpha|beta|rc)\.?([0-9]+) ]]; then
            PRERELEASE_TYPE="${BASH_REMATCH[1]}"
            PRERELEASE_NUM="${BASH_REMATCH[2]:-0}"
            case "$PRERELEASE_TYPE" in
              alpha) OFFSET=0 ;;
              beta)  OFFSET=0 ;;
              rc)    OFFSET=90 ;;
              *)     OFFSET=0 ;;
            esac
            SPARKLE_VERSION="${BASE_VERSION}$(printf "%02d" $((OFFSET + PRERELEASE_NUM)))"
          else
            SPARKLE_VERSION="${BASE_VERSION}99"
          fi

          IS_BETA="false"
          if [[ "$TAG" =~ -(beta|alpha|rc) ]]; then
            IS_BETA="true"
          fi

          # Beta: only appcast-beta.xml; Stable: both
          if [ "$IS_BETA" == "true" ]; then
            APPCAST_FILES=("docs/appcast-beta.xml")
          else
            APPCAST_FILES=("docs/appcast.xml" "docs/appcast-beta.xml")
          fi

          for APPCAST_FILE in "${APPCAST_FILES[@]}"; do
            echo "Updating $APPCAST_FILE for version $VERSION (sparkle:version=$SPARKLE_VERSION)"

          python3 << PYTHON_SCRIPT
          import xml.etree.ElementTree as ET
          import re
          from datetime import datetime

          ET.register_namespace('sparkle', 'http://www.andymatuschak.org/xml-namespaces/sparkle')

          tree = ET.parse('$APPCAST_FILE')
          root = tree.getroot()
          channel = root.find('channel')

          # Check if version already exists
          existing = False
          for item in channel.findall('item'):
              version_elem = item.find('{http://www.andymatuschak.org/xml-namespaces/sparkle}version')
              if version_elem is not None and version_elem.text == '$SPARKLE_VERSION':
                  print(f"Version $SPARKLE_VERSION already exists, skipping")
                  existing = True
                  break

          if existing:
              exit(0)

          item = ET.Element('item')

          title = ET.SubElement(item, 'title')
          title.text = f'Version $VERSION'

          pubDate = ET.SubElement(item, 'pubDate')
          pubDate.text = datetime.utcnow().strftime('%a, %d %b %Y %H:%M:%S +0000')

          sparkle_version = ET.SubElement(item, '{http://www.andymatuschak.org/xml-namespaces/sparkle}version')
          sparkle_version.text = '$SPARKLE_VERSION'

          sparkle_short = ET.SubElement(item, '{http://www.andymatuschak.org/xml-namespaces/sparkle}shortVersionString')
          sparkle_short.text = '$VERSION'

          sparkle_min = ET.SubElement(item, '{http://www.andymatuschak.org/xml-namespaces/sparkle}minimumSystemVersion')
          sparkle_min.text = '14.0'

          description = ET.SubElement(item, 'description')

          # Parse changelog
          def parse_changelog(version):
              try:
                  with open('CHANGELOG.md', 'r', encoding='utf-8') as f:
                      content = f.read()
              except Exception:
                  return None

              pattern = rf'## \[{re.escape(version)}\].*?\n(.*?)(?=\n## \[|$)'
              match = re.search(pattern, content, re.DOTALL)
              if not match:
                  return None

              section = match.group(1).strip()
              if not section:
                  return None

              html_parts = [f'<h2>CalendarPro {version}</h2>']
              current_list = []
              current_heading = None

              for line in section.split('\n'):
                  line = line.strip()
                  if not line:
                      continue
                  if line.startswith('### '):
                      if current_list:
                          html_parts.append(f'<ul>{"".join(current_list)}</ul>')
                          current_list = []
                      current_heading = line[4:]
                      html_parts.append(f'<h4>{current_heading}</h4>')
                  elif line.startswith('- ') or line.startswith('* '):
                      item_text = line[2:]
                      current_list.append(f'<li>{item_text}</li>')

              if current_list:
                  html_parts.append(f'<ul>{"".join(current_list)}</ul>')

              return ''.join(html_parts) if len(html_parts) > 1 else None

          changelog_html = parse_changelog('$VERSION')
          if changelog_html:
              description.text = changelog_html
          else:
              description.text = f'<h2>CalendarPro $VERSION</h2><ul><li>Version $VERSION release</li></ul>'

          enclosure = ET.SubElement(item, 'enclosure')
          enclosure.set('url', 'https://github.com/yelog/calendar-pro/releases/download/$TAG/CalendarPro-$VERSION-universal.dmg')
          enclosure.set('length', '$FILE_SIZE')
          enclosure.set('type', 'application/octet-stream')
          # Parse signature format: sparkle:edSignature="..." length="..."
          sig_parts = '$SIGNATURE'.split()
          for part in sig_parts:
              if '=' in part:
                  key, val = part.split('=', 1)
                  if val.startswith('"') and val.endswith('"'):
                      val = val[1:-1]
                  enclosure.set(key, val)

          # Insert after comment or as first item
          insert_pos = 4
          for i, child in enumerate(channel):
              if isinstance(child, ET.Element) and child.tag == 'item':
                  insert_pos = i
                  break
          channel.insert(insert_pos, item)

          tree.write('$APPCAST_FILE', encoding='UTF-8', xml_declaration=True)

          # Pretty print
          with open('$APPCAST_FILE', 'r') as f:
              content = f.read()
          content = re.sub(r'><item>', '>\n        <item>', content)
          content = re.sub(r'></item>', '>\n        </item>', content)
          content = re.sub(r'><title>', '>\n            <title>', content)
          content = re.sub(r'></title>', '</title>', content)
          content = re.sub(r'><pubDate>', '>\n            <pubDate>', content)
          content = re.sub(r'><sparkle:', '>\n            <sparkle:', content)
          content = re.sub(r'><description>', '>\n            <description>', content)
          content = re.sub(r'><enclosure', '>\n            <enclosure', content)
          content = re.sub(r'</channel></rss>', '</channel>\n</rss>', content)

          with open('$APPCAST_FILE', 'w') as f:
              f.write(content)

          print(f"Successfully added version $VERSION to $APPCAST_FILE")
          PYTHON_SCRIPT

          done

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and push appcast changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Stash appcast changes
          git stash push -m "appcast update"

          # Fetch main branch (we're in detached HEAD from tag push)
          git fetch origin main
          git checkout -B main origin/main

          # Apply stashed changes
          if ! git stash pop; then
            git checkout --theirs docs/appcast-beta.xml docs/appcast.xml || true
          fi

          git add docs/appcast-beta.xml docs/appcast.xml

          if git diff --cached --quiet; then
            echo "No changes to commit (appcast already up to date)"
          else
            git commit -m "chore(appcast): add ${{ steps.update_appcast.outputs.version }} release entry [skip ci]"
            git push origin main
            echo "Appcast updated and pushed to main"
          fi

      - name: Extract changelog for release notes
        id: extract_changelog
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          VERSION="${VERSION#v}"

          changelog_body=$(python3 << PYTHON
          import re

          try:
              with open('CHANGELOG.md', 'r', encoding='utf-8') as f:
                  content = f.read()
          except Exception:
              print("")
              exit(0)

          pattern = rf'## \[{re.escape("$VERSION")}\] - \d{{4}}-\d{{2}}-\d{{2}}\n(.*?)(?=\n## \[|$)'
          match = re.search(pattern, content, re.DOTALL)
          if not match:
              print("")
              exit(0)

          section = match.group(1).strip()
          if not section:
              print("")
              exit(0)

          lines = []
          for line in section.split('\n'):
              line = line.strip()
              if line:
                  lines.append(line)

          print('\n'.join(lines))
          PYTHON
          )

          echo "$changelog_body" > /tmp/release_notes.md
          echo "Extracted changelog:"
          cat /tmp/release_notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          DMG_PATH="dist/CalendarPro-${TAG#v}-universal.dmg"
          SHA_PATH="${DMG_PATH}.sha256"

          PRERELEASE_FLAG=""
          if [ "${{ steps.release_type.outputs.is_prerelease }}" == "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          if [ -s /tmp/release_notes.md ]; then
            echo "Using changelog from CHANGELOG.md"
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file /tmp/release_notes.md \
              $PRERELEASE_FLAG \
              "$DMG_PATH" \
              "$SHA_PATH"
          else
            echo "Using auto-generated notes"
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              $PRERELEASE_FLAG \
              "$DMG_PATH" \
              "$SHA_PATH"
          fi
